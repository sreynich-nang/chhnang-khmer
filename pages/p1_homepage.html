<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chhnang Khmer</title>
    <!-- bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- google-icons -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
    <style>
      body {
        background-color: #fbfaee;
        padding-top: 85px; /* Offset for the fixed-top navbar */
      }
    </style>
</head>

<body>
<!--navbar -->
    <div id="navbar"></div>
    
<!-- homepage content -->
    <!-- hero section -->
    <section
      class="position-relative vh-100 d-flex align-items-center overflow-hidden"
    >
      <!-- Background Image -->
      <div class="position-absolute top-0 start-0 w-100 h-100">
        <!-- blur on background -->
        <div
          class="position-absolute top-0 start-0 w-100 h-100 bg-dark opacity-50"
        ></div>
        <img
          src="https://malis.thalias.com.kh/wp-content/uploads/2024/05/Malis-Khmer-Traditional-Food.png"
          class="w-100 h-100 object-fit-cover"
          alt="Khmer-Cooking"
        />
      </div>

      <!-- Content -->
      <div class="container position-relative text-white">
        <div class="col-lg-6">
          <h1 class="display-3 fw-bold mb-4">Cook Khmer Food Easily</h1>
          <p class="lead mb-4">
            Fresh ingredients delivered with exact quantities. Rediscover the
            authentic flavors of Cambodia from your own kitchen.
          </p>
          <button
            id="id_orderBtn"
            class="btn btn-warning btn-lg rounded-pill px-5 fw-bold"
            style="background-color: #fed65b; border-color: #fed65b; color: #212529; transition: all 0.3s ease;"
            onmouseover="this.style.color='#e67e22'; document.getElementById('id_orderText').style.transform='translateX(6px)';"
            onmouseout="this.style.color='#212529'; document.getElementById('id_orderText').style.transform='translateX(0)';"
          >
            <span id="id_orderText" style="display: inline-block; transition: all 0.3s ease;">Order Now</span>
          </button>
        </div>
      </div>
    </section>



<!-- footer -->
    <div id="footer"></div>

    <!-- bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <!-- Loader Script -->
    <script>
      function loadComponent(url, elementId) {
        fetch(url)
          .then((response) => response.text())
          .then((data) => {
            document.getElementById(elementId).innerHTML = data;
          });
      }

      loadComponent("components/footer.html", "footer");
      loadComponent("components/nav.html", "navbar");
    </script>
</body>
</html>
