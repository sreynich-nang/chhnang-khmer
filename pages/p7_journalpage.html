<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Culinary Journal & Stories - Chhnang Khmer</title>
    <meta
      name="description"
      content="Explore culinary stories, cooking tips, and traditional Cambodian recipes from Chhnang Khmer."
    />
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- Material Icons -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body>
    <!-- Navbar -->
    <div id="navbar"></div>

    <main class="container py-5">
      <h1 class="fw-bold mb-4 text-dark font-title text-center">Culinary Journal</h1>
      <p class="lead text-muted text-center max-w-650 mx-auto">
        Discover stories behind Cambodian cuisine, cooking tutorials, and seasonal recipe kit updates.
      </p>
    </main>

    <!-- Footer -->
    <div id="footer"></div>

    <!-- Component Loader -->
    <script>
      function loadComponent(url, elementId) {
        fetch(url)
          .then((response) => response.text())
          .then((data) => {
            document.getElementById(elementId).innerHTML = data;
          });
      }

      loadComponent("components/footer.html", "footer");
      loadComponent("components/nav.html", "navbar");
    </script>
  </body>
</html>
