<!doctype html>
<html lang="en">

  <body>
    <!--navbar -->
    <div id="navbar"></div>

    <!-- homepage content -->

    <!-- footer -->
    <div id="footer"></div>

    <!-- Loader Script -->
    <script>
      function loadComponent(url, elementId) {
        fetch(url)
          .then((response) => response.text())
          .then((data) => {
            document.getElementById(elementId).innerHTML = data;
          });
      }

      loadComponent("components/footer.html", "footer");
      loadComponent("components/nav.html", "navbar");
    </script>
  </body>
</html>
