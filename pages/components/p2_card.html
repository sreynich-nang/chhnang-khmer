<div class="col">
  <div class="card p2-set-card h-100">
    <div class="p2-card-img-wrapper">
      <span class="badge bg-warning text-dark p2-card-badge">{{BADGE}}</span>
      <img src="{{IMAGE}}" alt="{{NAME}}">
    </div>
    <div class="card-body d-flex flex-column">
      <div class="flex-grow-1">
        <span class="badge bg-light text-dark text-capitalize mb-2 me-1 border">{{CUISINE}} Food</span>
        <span class="badge bg-light text-dark text-capitalize mb-2 border">{{DIET}}</span>
        <h4 class="fw-bold fs-5 text-dark mt-1 mb-2">{{NAME}}</h4>
        <p class="text-muted small">{{DESCRIPTION}}</p>
      </div>
      <div class="mt-3 pt-3 border-top d-flex justify-content-between align-items-center">
        <h4 class="text-warning fw-bold mb-0">${{PRICE}}</h4>
        <button class="btn p2-btn-action" onclick="window.location.href = 'p3_detailpage.html'">
          View Kit
        </button>
      </div>
    </div>
  </div>
</div>
